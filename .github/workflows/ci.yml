name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua (luac)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lua5.4

      - name: Lua syntax check
        run: |
          errors=0
          while IFS= read -r f; do
            luac5.4 -p "$f" 2>&1 || { echo "FAIL: $f"; errors=$((errors+1)); }
          done < <(find . -name '*.lua' -not -path './.data/*' -not -path './.git/*')
          [ "$errors" -eq 0 ] || exit 1
          echo "All Lua files pass syntax check"

      - name: Install StyLua
        run: |
          curl -fsSL https://github.com/JohnnyMorganz/StyLua/releases/download/v2.0.2/stylua-linux-x86_64.zip \
            -o /tmp/stylua.zip
          sudo unzip -o /tmp/stylua.zip -d /usr/local/bin >/dev/null
          stylua --version

      - name: StyLua format check
        run: |
          errors=0
          while IFS= read -r f; do
            if ! stylua --check "$f" 2>/dev/null; then
              echo "UNFORMATTED: $f"
              errors=$((errors+1))
            fi
          done < <(find . -name '*.lua' -not -path './.data/*' -not -path './.git/*')
          if [ "$errors" -gt 0 ]; then
            echo "Run 'stylua .' to fix formatting"
            exit 1
          fi
          echo "All Lua files are formatted"

      - name: Check for duplicate keymaps
        run: |
          errors=0
          dups=$(grep -rohP "<leader>\w+" --include='*.lua' . \
            | sort | uniq -d)
          if [ -n "$dups" ]; then
            echo "Duplicate leader keymaps found:"
            echo "$dups"
            errors=$((errors+1))
          fi
          [ "$errors" -eq 0 ] || exit 1
          echo "No duplicate leader keymaps"

      - name: Validate git hooks
        run: |
          if command -v bash &>/dev/null; then
            bash -n .githooks/pre-push && echo "✓ pre-push hook syntax OK"
          fi

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate LSP config names exist in nvim-lspconfig
        run: |
          git clone --depth=1 https://github.com/neovim/nvim-lspconfig.git /tmp/nvim-lspconfig
          errors=0
          for name in lua_ls phpantom_lsp rust_analyzer ts_ls volar gopls; do
            if [ -f "/tmp/nvim-lspconfig/lsp/${name}.lua" ] \
               || [ -f "/tmp/nvim-lspconfig/lua/lspconfig/configs/${name}.lua" ]; then
              echo "  ✓ $name"
            else
              echo "  ✗ $name — no config in nvim-lspconfig"
              errors=$((errors+1))
            fi
          done
          [ "$errors" -eq 0 ] || exit 1

      - name: Verify Mason packages exist in registry
        run: |
          curl -sL 'https://mason-registry.dev/registry/list' \
            | grep -oP '<pre class="list_pre__Mcafh">:MasonInstall <!-- -->\K[^<]+(?=</pre>)' \
            | sort -u > /tmp/mason.txt
          for pkg in \
            lua-language-server rust-analyzer \
            typescript-language-server vue-language-server gopls \
            stylua prettier prettierd eslint_d goimports gofumpt markdownlint \
            delve codelldb js-debug-adapter php-debug-adapter
          do
            if grep -qw "$pkg" /tmp/mason.txt; then
              echo "  ✓ $pkg"
            else
              echo "  ✗ $pkg NOT FOUND in Mason registry"
              exit 1
            fi
          done
          echo "All Mason packages verified"

      - name: Check dependency drift — LSP servers in config vs CI
        run: |
          ci_list="lua_ls phpantom_lsp rust_analyzer ts_ls volar gopls"
          # Extract LSP server keys from the servers table in init.lua
          config_list=$(sed -n '/^[[:space:]]*local servers = {/,/^[[:space:]]*}/p' init.lua \
            | grep -oP '^\s+\K\w+(?=\s*=\s*\{)' \
            | tr '\n' ' ')
          missing=""
          for s in $config_list; do
            if ! echo "$ci_list" | grep -qw "$s"; then
              missing="$missing $s"
            fi
          done
          if [ -n "$missing" ]; then
            echo "⚠ LSP servers in config but not in CI validation:$missing"
            echo "Add them to the 'validate' job"
          else
            echo "All config LSP servers are covered by CI checks"
          fi

  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        nvim-version: [stable, nightly]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install Neovim (${{ matrix.nvim-version }})
        run: |
          if [ "${{ matrix.nvim-version }}" = "nightly" ]; then
            sudo add-apt-repository -y ppa:neovim-ppa/unstable
          else
            sudo add-apt-repository -y ppa:neovim-ppa/stable
          fi
          sudo apt-get update -qq
          sudo apt-get install -y -qq neovim

      - name: Headless startup test
        run: |
          # Clone dependencies so the config can load
          mkdir -p "$HOME/.local/share/nvim/lazy"
          git clone --depth=1 https://github.com/neovim/nvim-lspconfig.git \
            "$HOME/.local/share/nvim/lazy/nvim-lspconfig" 2>/dev/null || true
          git clone --depth=1 https://github.com/nvim-lua/plenary.nvim.git \
            "$HOME/.local/share/nvim/lazy/plenary.nvim" 2>/dev/null || true

          output=$(nvim --headless -c 'q' 2>&1) || true
          if echo "$output" | grep -qi "error"; then
            echo "✗ Errors during headless startup:"
            echo "$output"
            exit 1
          fi
          echo "✓ Neovim loads config without errors"

      - name: LSP smoke tests
        run: |
          errors=0

          # phpantom_lsp
          echo "::group::phpantom_lsp"
          if command -v cargo &>/dev/null; then
            cargo install phpantom_lsp --locked --force 2>&1
            export PATH="$HOME/.cargo/bin:$PATH"
            phpantom_lsp --version 2>&1 && echo "✓ phpantom_lsp binary works"
            printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"capabilities":{},"rootUri":null}}\r\n' \
              | timeout 30 phpantom_lsp 2>/dev/null \
              | head -1 \
              | grep -q '"id":1' && echo "✓ phpantom_lsp responds to LSP initialize" \
              || echo "⚠ phpantom_lsp LSP handshake (non-fatal)"
          else
            echo "⚠ cargo not available, skipping"
          fi
          echo "::endgroup::"

          echo "::group::lua_ls"
          sudo apt-get install -y -qq lua-language-server 2>/dev/null || true
          if command -v lua-language-server &>/dev/null; then
            lua-language-server --version 2>&1 && echo "✓ lua-language-server installed"
            printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"capabilities":{},"rootUri":null,"processId":null,"workspaceFolders":null}}\r\n{"jsonrpc":"2.0","method":"initialized","params":{}}\r\n' \
              | timeout 10 lua-language-server --stdio 2>/dev/null \
              | head -1 \
              | grep -q '"id":1' && echo "✓ lua-language-server responds to LSP" \
              || echo "⚠ lua-language-server handshake (non-fatal)"
          else
            echo "⚠ lua-language-server not available via apt"
          fi
          echo "::endgroup::"

          echo "::group::gopls"
          sudo apt-get install -y -qq golang gopls 2>/dev/null || true
          if command -v gopls &>/dev/null; then
            gopls version 2>&1 && echo "✓ gopls installed"
          else
            echo "⚠ gopls not available via apt"
          fi
          echo "::endgroup::"

          exit $errors
