name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Install Lua (for luac syntax check)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lua5.4

      - name: Check Lua syntax
        run: |
          errors=0
          while IFS= read -r f; do
            luac -p "$f" 2>&1 || { echo "FAIL: $f"; errors=$((errors+1)); }
          done < <(find . -name '*.lua' -not -path './.data/*' -not -path './.git/*')
          if [ "$errors" -gt 0 ]; then exit 1; fi
          echo "All Lua files pass syntax check"

      - name: Verify Mason packages exist in registry
        run: |
          curl -sL 'https://mason-registry.dev/registry/list' \
            | grep -oP '<pre class="list_pre__Mcafh">:MasonInstall <!-- -->\K[^<]+(?=</pre>)' \
            | sort -u > /tmp/mason.txt
          for pkg in \
            lua-language-server rust-analyzer \
            typescript-language-server vue-language-server gopls \
            stylua prettier prettierd eslint_d goimports gofumpt markdownlint \
            delve codelldb js-debug-adapter php-debug-adapter
          do
            if grep -qw "$pkg" /tmp/mason.txt; then
              echo "  ✓ $pkg"
            else
              echo "  ✗ $pkg NOT FOUND in Mason registry"
              exit 1
            fi
          done
          echo "All 16 Mason packages verified"

      - name: Headless startup test
        run: |
          nvim --headless -c "lua vim.wait(15000)" -c "lua vim.notify('CI: startup OK')" -c "qa" 2>&1 | tee /tmp/nvim-startup.log
          if grep -qiE 'cannot find package|failed to run|error running|ENOENT' /tmp/nvim-startup.log; then
            echo "--- ERRORS DETECTED ---"
            grep -iE 'cannot find package|failed to run|error running|ENOENT' /tmp/nvim-startup.log
            exit 1
          fi
          echo "Startup test passed"

      - name: Check Neovim log for LSP errors
        run: |
          if [ -f ~/.local/state/nvim/lsp.log ]; then
            if grep -qiE 'exit code|error|failed' ~/.local/state/nvim/lsp.log; then
              echo "LSP errors found:"
              grep -iE 'exit code|error|failed' ~/.local/state/nvim/lsp.log
            else
              echo "No LSP errors"
            fi
          else
            echo "No LSP log (expected in CI without language runtimes)"
          fi
