name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua (for luac syntax check)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lua5.4

      - name: Check Lua syntax
        run: |
          errors=0
          while IFS= read -r f; do
            luac5.4 -p "$f" 2>&1 || { echo "FAIL: $f"; errors=$((errors+1)); }
          done < <(find . -name '*.lua' -not -path './.data/*' -not -path './.git/*')
          if [ "$errors" -gt 0 ]; then exit 1; fi
          echo "All Lua files pass syntax check"

      - name: Verify Mason packages exist in registry
        run: |
          curl -sL 'https://mason-registry.dev/registry/list' \
            | grep -oP '<pre class="list_pre__Mcafh">:MasonInstall <!-- -->\K[^<]+(?=</pre>)' \
            | sort -u > /tmp/mason.txt
          for pkg in \
            lua-language-server rust-analyzer \
            typescript-language-server vue-language-server gopls \
            stylua prettier prettierd eslint_d goimports gofumpt markdownlint \
            delve codelldb js-debug-adapter php-debug-adapter
          do
            if grep -qw "$pkg" /tmp/mason.txt; then
              echo "  ✓ $pkg"
            else
              echo "  ✗ $pkg NOT FOUND in Mason registry"
              exit 1
            fi
          done
          echo "All 16 Mason packages verified"


